<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCHEDULE // SYS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
  <style>
    :root {
      --bg: #000000;
      --fg: #FFFFFF;
      --border: 2px solid var(--fg);
      --font: 'Courier New', Courier, monospace;
    }

    /* Themes */
    body.theme-matrix {
      --bg: #000000;
      --fg: #00FF00;
    }
    body.theme-sepia {
      --bg: #F4ECD8;
      --fg: #433422;
    }
    body.theme-contrast {
      --bg: #FFFFFF;
      --fg: #000000;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      line-height: 1.5;
      padding: 2rem;
      text-transform: uppercase;
      min-height: 100vh;
      transition: background 0.15s, color 0.15s;
    }

    header {
      margin-bottom: 2rem;
      border-bottom: var(--border);
      padding-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: -2px;
      margin: 0;
    }

    .badge {
      border: var(--border);
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .auth-container {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    input, select {
      background: var(--bg);
      color: var(--fg);
      border: var(--border);
      padding: 0.75rem 1rem;
      font-family: var(--font);
      font-size: 1rem;
      outline: none;
    }

    input[type="password"], input[type="text"], input[type="time"], input[type="date"], select {
      width: 100%;
    }

    input:focus, select:focus {
      background: var(--fg);
      color: var(--bg);
    }

    input::placeholder {
      color: #888888;
      opacity: 0.7;
    }

    button {
      background: var(--fg);
      color: var(--bg);
      border: var(--border);
      padding: 0.75rem 1.5rem;
      font-family: var(--font);
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      transition: all 0.1s;
    }

    button:hover, button:active {
      background: var(--bg);
      color: var(--fg);
    }

    /* Admin Panel styles */
    #admin-panel {
      display: none;
      border: var(--border);
      padding: 1.5rem;
      margin-bottom: 2rem;
      background: var(--bg);
    }

    .admin-title {
      font-size: 1.5rem;
      font-weight: bold;
      border-bottom: var(--border);
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    @media (min-width: 900px) {
      .admin-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .admin-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .admin-section h3 {
      font-size: 1.1rem;
      border-bottom: 1px dashed var(--fg);
      padding-bottom: 0.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-row {
      display: flex;
      gap: 0.5rem;
    }

    .blocker-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 150px;
      overflow-y: auto;
    }

    .blocker-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--fg);
      padding: 0.5rem;
      font-size: 0.8rem;
    }

    .blocker-item button {
      padding: 0.2rem 0.5rem;
      font-size: 0.7rem;
    }

    /* Main layouts */
    #calendar-container {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: 1fr;
    }

    @media (min-width: 768px) {
      #calendar-container {
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      }
    }

    .event {
      border: var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: var(--bg);
      color: var(--fg);
    }

    .event-time {
      font-size: 0.9rem;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--fg);
      padding-bottom: 0.75rem;
    }

    .event-title {
      font-size: 1.4rem;
      font-weight: bold;
      word-wrap: break-word;
    }

    .loading, .error {
      font-size: 1.2rem;
      padding: 2rem;
      border: var(--border);
      text-align: center;
      grid-column: 1 / -1;
    }

    .error {
      color: var(--bg);
      background: var(--fg);
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <h1>SCHEDULE // SYS</h1>
      <div id="access-badge" class="badge">ROLE: GUEST</div>
    </div>
    <div class="auth-container">
      <input type="password" id="access-token" placeholder="ENTER ACCESS TOKEN" style="max-width: 350px;">
      <button id="auth-btn">VERIFY</button>
    </div>
  </header>

  <!-- Admin Panel Settings -->
  <section id="admin-panel">
    <div class="admin-title">ADMIN CONFIGURATION PANEL</div>
    <div class="admin-grid">
      <!-- Section 1: UI & Format Settings -->
      <div class="admin-section">
        <h3>1. SITE CUSTOMIZATION</h3>
        
        <div class="form-group">
          <label for="admin-theme">THEME / SCHEME</label>
          <select id="admin-theme">
            <option value="default">STRICT STARK (DEFAULT)</option>
            <option value="matrix">TERMINAL GREEN</option>
            <option value="sepia">RETRO SEPIA</option>
            <option value="contrast">HIGH CONTRAST WHITE</option>
          </select>
        </div>

        <div class="form-group">
          <label for="redact-label">REDACTION OVERRIDE LABEL (FOR GUESTS)</label>
          <input type="text" id="redact-label" placeholder="STATUS: BUSY">
        </div>

        <div class="form-group">
          <label for="time-format">TIME FORMAT</label>
          <select id="time-format">
            <option value="24h">24-HOUR MILITARY</option>
            <option value="12h">12-HOUR AM/PM</option>
          </select>
        </div>
      </div>

      <!-- Section 2: Local Blocker Events -->
      <div class="admin-section">
        <h3>2. LOCAL TIMELINE OVERRIDES (LOCAL STORAGE)</h3>
        
        <div class="form-group">
          <label>ADD MANUAL BLOCKOUT EVENT</label>
          <input type="text" id="override-title" placeholder="EVENT TITLE (e.g. MEETING)">
          <div class="form-row">
            <input type="date" id="override-date">
            <input type="time" id="override-start">
            <input type="time" id="override-end">
          </div>
          <button id="add-override-btn">ADD OVERRIDE</button>
        </div>

        <div class="form-group">
          <label>CURRENT OVERRIDES</label>
          <ul id="blocker-list-el" class="blocker-list">
            <!-- Items injected dynamically -->
          </ul>
        </div>
      </div>
    </div>
  </section>

  <main id="calendar-container">
    <div class="loading">FETCHING SCHEDULE DATA...</div>
  </main>

  <script>
    const API_URL = '/api/calendar';
    
    // Elements
    const tokenInput = document.getElementById('access-token');
    const authBtn = document.getElementById('auth-btn');
    const container = document.getElementById('calendar-container');
    const accessBadge = document.getElementById('access-badge');
    const adminPanel = document.getElementById('admin-panel');
    
    // Admin Setting Elements
    const adminTheme = document.getElementById('admin-theme');
    const redactLabel = document.getElementById('redact-label');
    const timeFormat = document.getElementById('time-format');
    const overrideTitle = document.getElementById('override-title');
    const overrideDate = document.getElementById('override-date');
    const overrideStart = document.getElementById('override-start');
    const overrideEnd = document.getElementById('override-end');
    const addOverrideBtn = document.getElementById('add-override-btn');
    const blockerListEl = document.getElementById('blocker-list-el');

    // Local configuration settings (persisted across sessions)
    const config = {
      theme: localStorage.getItem('cfg_theme') || 'default',
      redactText: localStorage.getItem('cfg_redact_text') || 'STATUS: BUSY',
      timeFormat: localStorage.getItem('cfg_time_format') || '24h',
      overrides: JSON.parse(localStorage.getItem('cfg_overrides') || '[]')
    };

    // State variables
    let currentFeeds = [];
    let currentRole = 'guest';

    // Apply saved configurations initially
    applyConfigUI();

    // Event listeners
    authBtn.addEventListener('click', () => {
      renderCalendar(true);
    });
    tokenInput.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') renderCalendar(true);
    });

    // Admin Config Panel Change Listeners
    adminTheme.addEventListener('change', (e) => {
      config.theme = e.target.value;
      localStorage.setItem('cfg_theme', config.theme);
      applyConfigUI();
    });

    redactLabel.addEventListener('input', (e) => {
      config.redactText = e.target.value.trim() || 'STATUS: BUSY';
      localStorage.setItem('cfg_redact_text', config.redactText);
      renderCalendar(false); // Quick re-render
    });

    timeFormat.addEventListener('change', (e) => {
      config.timeFormat = e.target.value;
      localStorage.setItem('cfg_time_format', config.timeFormat);
      renderCalendar(false);
    });

    addOverrideBtn.addEventListener('click', () => {
      const title = overrideTitle.value.trim();
      const dateVal = overrideDate.value;
      const startVal = overrideStart.value;
      const endVal = overrideEnd.value;

      if (!title || !dateVal || !startVal || !endVal) {
        alert('ALL OVERRIDE FIELDS REQUIRED.');
        return;
      }

      const overrideEvent = {
        id: Date.now().toString(),
        title: title,
        start: `${dateVal}T${startVal}`,
        end: `${dateVal}T${endVal}`
      };

      config.overrides.push(overrideEvent);
      localStorage.setItem('cfg_overrides', JSON.stringify(config.overrides));
      
      // Reset inputs
      overrideTitle.value = '';
      overrideDate.value = '';
      overrideStart.value = '';
      overrideEnd.value = '';

      renderOverridesList();
      renderCalendar(false);
    });

    function applyConfigUI() {
      // Set Theme Classes
      document.body.className = '';
      if (config.theme !== 'default') {
        document.body.classList.add(`theme-${config.theme}`);
      }
      adminTheme.value = config.theme;
      redactLabel.value = config.redactText;
      timeFormat.value = config.timeFormat;
      renderOverridesList();
    }

    function renderOverridesList() {
      blockerListEl.innerHTML = '';
      config.overrides.forEach(ov => {
        const li = document.createElement('li');
        li.className = 'blocker-item';
        const startFormatted = ov.start.replace('T', ' ');
        li.innerHTML = `
          <span>${ov.title} (${startFormatted})</span>
          <button data-id="${ov.id}">DEL</button>
        `;
        li.querySelector('button').addEventListener('click', (e) => {
          const idToDelete = e.target.getAttribute('data-id');
          config.overrides = config.overrides.filter(item => item.id !== idToDelete);
          localStorage.setItem('cfg_overrides', JSON.stringify(config.overrides));
          renderOverridesList();
          renderCalendar(false);
        });
        blockerListEl.appendChild(li);
      });
    }

    async function renderCalendar(forceFetch = false) {
      const token = tokenInput.value.trim();
      
      try {
        if (forceFetch || currentFeeds.length === 0) {
          container.innerHTML = '<div class="loading">FETCHING SCHEDULE DATA...</div>';
          
          const response = await fetch(`${API_URL}?token=${encodeURIComponent(token)}`);
          if (!response.ok) throw new Error('DATA_UNAVAILABLE');
          
          const result = await response.json();
          currentFeeds = result.feeds || [];
          currentRole = result.accessLevel || 'guest';
        }

        // Access Level Badge
        accessBadge.textContent = `ROLE: ${currentRole.toUpperCase()}`;
        
        // Show Admin Panel if admin
        if (currentRole === 'admin') {
          adminPanel.style.display = 'block';
        } else {
          adminPanel.style.display = 'none';
        }

        const events = [];
        const now = ICAL.Time.now();
        const windowEnd = now.clone();
        windowEnd.addDuration(new ICAL.Duration({ days: 30 }));

        // Process parsed feeds
        currentFeeds.forEach(feedData => {
          const jcalData = ICAL.parse(feedData);
          const comp = new ICAL.Component(jcalData);
          const vevents = comp.getAllSubcomponents('vevent');

          vevents.forEach(vevent => {
            const event = new ICAL.Event(vevent);
            
            if (event.isRecurring()) {
              const iter = event.iterator();
              let next;
              while ((next = iter.next()) && next.compare(windowEnd) < 0) {
                if (next.compare(now) >= 0) {
                  const occ = event.getOccurrenceDetails(next);
                  events.push({
                    title: event.summary,
                    startDate: occ.startDate.toJSDate(),
                    endDate: occ.endDate.toJSDate()
                  });
                }
              }
            } else {
              if (event.endDate.compare(now) >= 0) {
                events.push({
                  title: event.summary,
                  startDate: event.startDate.toJSDate(),
                  endDate: event.endDate.toJSDate()
                });
              }
            }
          });
        });

        // Add Local Override Blocks
        config.overrides.forEach(ov => {
          const startDate = new Date(ov.start);
          const endDate = new Date(ov.end);
          if (endDate >= new Date()) {
            events.push({
              title: currentRole === 'guest' ? config.redactText : ov.title,
              startDate,
              endDate,
              isLocalOverride: true
            });
          }
        });

        // Sort by start date
        events.sort((a, b) => a.startDate - b.startDate);
          
        container.innerHTML = '';
        
        if (events.length === 0) {
          container.innerHTML = `<div class="event"><div class="event-title">NO UPCOMING EVENTS</div></div>`;
          return;
        }

        events.forEach(e => {
          const el = document.createElement('div');
          el.className = 'event';

          const timeString = formatTime(e.startDate) + ' - ' + formatTime(e.endDate);
          const dateString = formatDate(e.startDate);
          
          // If Guest view, we make sure to use the active config redactText in case the raw output wasn't overwritten or we're styling local items
          let displayTitle = e.title;
          if (currentRole === 'guest' && displayTitle === 'STATUS: BUSY') {
            displayTitle = config.redactText;
          }

          el.innerHTML = `
            <div class="event-time">${dateString} // ${timeString}</div>
            <div class="event-title">${displayTitle} ${e.isLocalOverride ? '[MANUAL BLOCK]' : ''}</div>
          `;
          container.appendChild(el);
        });

      } catch (err) {
        container.innerHTML = `<div class="error">ERR: ${err.message}</div>`;
        console.error(err);
      }
    }

    function formatTime(date) {
      if (config.timeFormat === '12h') {
        return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
      }
      return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function formatDate(date) {
      return date.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '.');
    }

    // Initial render
    renderCalendar();
  </script>
</body>
</html>
